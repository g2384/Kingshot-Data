<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <style>
    :root {
      color-scheme: light;
      color: #3d2817;
      background: #8C5738;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1rem;
      background: #8C5738;
    }

    .page-header {
      max-width: 1400px;
      margin: 0 auto 2rem;
      text-align: center;
    }

    .page-title {
      font-size: 2.5rem;
      font-weight: 800;
      color: #3d2817;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .cards-container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(600px, 1fr));
      gap: 1.5rem;
    }

    .card {
      border-radius: 15px;
      background: #EDDCCC;
      border: 5px solid #B9A283;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
      display: flex;
      flex-direction: row;
      height: 100%;
    }

    .card:hover {
      border-color: #8C5738;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      transform: translateY(-4px);
    }

    .card-screenshot {
      width: 25%;
      aspect-ratio: 432/760;
      object-fit: cover;
      display: block;
      background: #c9b5a0;
      flex-shrink: 0;
      overflow: hidden;
      border-radius: 10px 0px 0px 10px;
    }

    .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .card-header {
      padding: 1.2rem 1.2rem 0.8rem;
      border-bottom: 1px solid rgba(185, 162, 131, 0.3);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #3d2817;
      margin: 0;
      line-height: 1.3;
      word-break: break-word;
    }

    .card-options {
      padding: 1rem 1.2rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
    }

    .option-item {
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(185, 162, 131, 0.3);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .option-item:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: #B9A283;
    }

    .option-choice {
      font-weight: 600;
      color: #3d2817;
      font-size: 0.9rem;
      margin-bottom: 0.35rem;
    }

    .option-choice:empty {
      display: none;
    }

    .option-reward {
      font-size: 0.8rem;
      color: #5d4d3d;
      font-weight: 500;
    }

    .option-item.best {
      background: #ffe00038;
      border-color: rgba(140, 87, 56, 0.3);
    }

    .option-item.best .option-choice {
      color: #8C5738;
    }

    .option-item.best .option-reward {
      color: #8C5738;
      text-shadow: 0 0 12px rgba(140, 87, 56, 0.3);
      font-weight: 600;
    }

    .option-reward:empty {
      display: none;
    }
  </style>
</head>

  <script>
    const data = JSON.parse(document.getElementById('journey-data').textContent);
    const container = document.getElementById('cards-container');

    data.forEach(entry => {
      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.className = 'card-screenshot';
      img.src = `images/journey/${entry.screenshot}`;
      img.alt = entry.title;
      card.appendChild(img);

      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'card-content';

      const header = document.createElement('div');
      header.className = 'card-header';
      const title = document.createElement('h3');
      title.className = 'card-title';
      title.textContent = entry.title;
      header.appendChild(title);
      contentWrapper.appendChild(header);

      const optionsContainer = document.createElement('div');
      optionsContainer.className = 'card-options';

      entry.options.forEach(item => {
        if (item.option || item.reward) {
          const optionDiv = document.createElement('div');
          optionDiv.className = 'option-item';
          if (item.isBest) {
            optionDiv.classList.add('best');
          }

          const choice = document.createElement('div');
          choice.className = 'option-choice';
          choice.textContent = item.option;
          optionDiv.appendChild(choice);

          const reward = document.createElement('div');
          reward.className = 'option-reward';
          reward.textContent = item.reward;
          optionDiv.appendChild(reward);

          optionsContainer.appendChild(optionDiv);
        }
      });

      contentWrapper.appendChild(optionsContainer);
      card.appendChild(contentWrapper);
      container.appendChild(card);
    });
  </script>
