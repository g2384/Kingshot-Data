<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey Options</title>
  <style>
    :root {
      color-scheme: light;
      color: #3d2817;
      background: #8C5738;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1rem;
      background: #8C5738;
    }

    .page-header {
      max-width: 1400px;
      margin: 0 auto 2rem;
      text-align: center;
    }

    .page-title {
      font-size: 2.5rem;
      font-weight: 800;
      color: #3d2817;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .journey-section {
      max-width: 1400px;
      margin: 0 auto 2rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      border: 2px solid rgba(255, 255, 255, 0.16);
    }

    .journey-heading {
      font-size: 1.6rem;
      margin: 0 0 1rem;
      color: #3d2817;
      border-bottom: 2px solid rgba(185, 162, 131, 0.35);
      padding-bottom: 0.5rem;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(600px, 1fr));
      gap: 1.5rem;
    }

    .card {
      border-radius: 15px;
      background: #EDDCCC;
      border: 5px solid #B9A283;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
      display: flex;
      flex-direction: row;
      height: 100%;
    }

    .card:hover {
      border-color: #8C5738;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      transform: translateY(-4px);
    }

    .card-screenshot {
      width: 28%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: #c9b5a0;
      flex-shrink: 0;
      overflow: hidden;
      border-radius: 10px 0 0 10px;
    }

    .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 1rem 1rem 1rem 1rem;
    }

    .card-header {
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(185, 162, 131, 0.3);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #3d2817;
      margin: 0;
      line-height: 1.4;
      word-break: break-word;
    }

    .card-meta {
      font-size: 0.85rem;
      color: #5d4d3d;
      margin-top: 0.45rem;
    }

    .card-options {
      padding-top: 0.9rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
    }

    .option-item {
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(185, 162, 131, 0.3);
      transition: all 0.2s ease;
      cursor: default;
    }

    .option-item:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: #B9A283;
    }

    .option-choice {
      font-weight: 600;
      color: #3d2817;
      font-size: 0.95rem;
      margin-bottom: 0.35rem;
    }

    .option-reward {
      font-size: 0.82rem;
      color: #5d4d3d;
      font-weight: 500;
    }

    .option-item.best {
      background: #f2dda0;
      border-color: rgba(140, 87, 56);
    }

    .option-item.best .option-choice {
      color: #8C5738;
    }

    .option-item.best .option-reward {
      color: #8C5738;
      text-shadow: 0 0 12px rgba(140, 87, 56, 0.2);
      font-weight: 600;
    }

    .option-reward:empty {
      display: none;
    }

    .card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .card-header {
      padding: 1.2rem 1.2rem 0.8rem;
      border-bottom: 1px solid rgba(185, 162, 131, 0.3);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #3d2817;
      margin: 0;
      line-height: 1.3;
      word-break: break-word;
    }

    .card-options {
      padding: 1rem 1.2rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
    }

    .option-item {
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(185, 162, 131, 0.3);
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .option-item:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: #B9A283;
    }

    .option-choice {
      font-weight: 600;
      color: #3d2817;
      font-size: 0.9rem;
      margin-bottom: 0.35rem;
    }

    .option-choice:empty {
      display: none;
    }

    .option-reward {
      font-size: 0.8rem;
      color: #5d4d3d;
      font-weight: 500;
    }

    .option-item.best {
      background: #f2dda0;
      border-color: rgba(140, 87, 56);
    }

    .option-item.best .option-choice {
      color: #8C5738;
    }

    .option-item.best .option-reward {
      color: #8C5738;
      text-shadow: 0 0 12px rgba(140, 87, 56, 0.3);
      font-weight: 600;
    }

    .card.chance-ultimate-luck {
      background: #ffd99e;
      border-color: #fe9f52;
    }

    .card.chance-stroke-of-luck {
      background: #d5d0f0;
      border-color: #a097cb;
    }

    .card.chance-lucky {
      background: #c6e4ee;
      border-color: #90bfcf;
    }

    .card.chance-routine {
      background: #eeddcd;
      border-color: #c0a989;
    }

    .option-reward:empty {
      display: none;
    }

    @media (max-width: 960px) {
      .cards-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 0.75rem 0.5rem;
      }

      .page-header,
      .journey-section {
        margin-left: 0.35rem;
        margin-right: 0.35rem;
      }

      .page-title {
        font-size: 2rem;
      }

      .journey-section {
        padding: 0.75rem;
      }

      .journey-heading {
        font-size: 1.3rem;
      }

      .cards-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .card {
        flex-direction: column;
      }

      .card-screenshot {
        width: 100%;
        border-radius: 15px 15px 0 0;
        aspect-ratio: 16 / 5;
      }

      .card-content {
        padding: 0.75rem;
      }

      .card-options {
        padding-top: 0.6rem;
      }
    }
  </style>
</head>

        {"option": "Find out yourself.**", "reward": "50 Master's Manuscript", "isBest": true}
      ]
    },
    {
      "title": "Valora Trade Resources",
      "screenshot": "valora-trade.webp",
      "isRepeated": true,
      "options": [
        {"option": "Trade resources.", "reward": "5 Valora Emblem", "isBest": true},
        {"option": "Don't trade.", "reward": "3 Valora Emblem"}
      ]
    },
    {
      "title": "???",
      "screenshot": "cassia-sort-loot.webp",
      "isRepeated": true,
      "options": [
        {"option": "Sort loot", "reward": "5 Cassia's Emblem", "isBest": true},
        {"option": "???", "reward": "??"}
      ]
    }
  ]
  </script>

  <script>
    const data = JSON.parse(document.getElementById('journey-data').textContent);
    const repeatedContainer = document.getElementById('repeated-journeys');
    const oneoffContainer = document.getElementById('oneoff-journeys');
    const unknownContainer = document.getElementById('unknown-journeys');

    const chanceClassMap = {
      'ultimate luck': 'chance-ultimate-luck',
      'gold': 'chance-ultimate-luck',
      'a stroke of luck': 'chance-stroke-of-luck',
      'purple': 'chance-stroke-of-luck',
      'lucky': 'chance-lucky',
      'blue': 'chance-lucky',
      'routine': 'chance-routine',
      'grey': 'chance-routine'
    };

    function getChanceValue(chance) {
      return (chance || 'Routine').trim();
    }

    function getChanceClass(chance) {
      const normalized = getChanceValue(chance).toLowerCase();
      return chanceClassMap[normalized] || 'chance-routine';
    }

    function getChanceRank(chance) {
      const normalized = getChanceValue(chance).toLowerCase();
      if (normalized === 'routine' || normalized === 'grey') return 0;
      if (normalized === 'lucky' || normalized === 'blue') return 1;
      if (normalized === 'a stroke of luck' || normalized === 'purple') return 2;
      if (normalized === 'ultimate luck' || normalized === 'gold') return 3;
      return 4;
    }

    function makeCard(entry) {
      const card = document.createElement('article');
      card.className = 'card';
      card.classList.add(getChanceClass(entry.chance));

      const img = document.createElement('img');
      img.className = 'card-screenshot';
      img.src = `images/journey/${entry.screenshot}`;
      img.alt = entry.title;
      card.appendChild(img);

      const contentWrapper = document.createElement('div');
      contentWrapper.className = 'card-content';

      const header = document.createElement('div');
      header.className = 'card-header';
      const title = document.createElement('h3');
      title.className = 'card-title';
      title.textContent = entry.title;
      header.appendChild(title);
      contentWrapper.appendChild(header);

      const optionsContainer = document.createElement('div');
      optionsContainer.className = 'card-options';

      entry.options.forEach(item => {
        if (item.option || item.reward) {
          const optionDiv = document.createElement('div');
          optionDiv.className = 'option-item';
          if (item.isBest) optionDiv.classList.add('best');

          const choice = document.createElement('div');
          choice.className = 'option-choice';
          choice.textContent = item.option;
          optionDiv.appendChild(choice);

          const reward = document.createElement('div');
          reward.className = 'option-reward';
          reward.textContent = item.reward;
          optionDiv.appendChild(reward);

          optionsContainer.appendChild(optionDiv);
        }
      });

      contentWrapper.appendChild(optionsContainer);
      card.appendChild(contentWrapper);
      return card;
    }

    function appendSortedCards(container, entries) {
      entries
        .slice()
        .sort((a, b) => getChanceRank(a.chance) - getChanceRank(b.chance))
        .forEach(entry => {
          container.appendChild(makeCard(entry));
        });
    }

    appendSortedCards(repeatedContainer, data.filter(entry => entry.isRepeated));
    appendSortedCards(oneoffContainer, data.filter(entry => entry.isOneoff));
    appendSortedCards(unknownContainer, data.filter(entry => !entry.isRepeated && !entry.isOneoff));
  </script>
</body>
